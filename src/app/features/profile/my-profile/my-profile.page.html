<ion-header>
  <ion-toolbar>
    <ion-title class="font-display">Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="profile-container">
    <p class="font-body" style="color: var(--text-secondary)">
      Próximamente: perfil de usuario
    </p>

    <ion-button
      expand="block"
      color="danger"
      class="logout-btn"
      (click)="logout()"
    >
      <ion-icon slot="start" name="log-out-outline"></ion-icon>
      Cerrar sesión
    </ion-button>
  </div>
</ion-content>
